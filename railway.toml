[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py migrate && python manage.py shell -c \"from django.contrib.auth.models import User; from django.contrib.auth import authenticate; u, _ = User.objects.get_or_create(username='admin'); u.is_staff=True; u.is_superuser=True; u.is_active=True; u.set_password('12345678'); u.save(); print('ADMIN_EXISTS', list(User.objects.filter(username='admin').values('username','is_staff','is_superuser','is_active'))); print('AUTH_RESULT', authenticate(username='admin', password='12345678'))\" && gunicorn campus_market.wsgi:application"