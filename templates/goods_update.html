<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑商品</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #eef5ff);
            font-family: "Microsoft YaHei", sans-serif;
        }
        .form-card {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        }
        .preview-image {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 12px;
            background-color: #f3f3f3;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <h2 class="mb-4">编辑商品</h2>

        {% if message %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row g-4">
                <div class="col-md-7">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">商品名称</label>
                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                value="{{ goods.title }}"
                                placeholder="请输入商品名称"
                                required
                            >
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">价格</label>
                            <input
                                type="number"
                                step="0.01"
                                min="0"
                                max="99999999.99"
                                name="price"
                                class="form-control"
                                value="{{ goods.price }}"
                                placeholder="请输入价格"
                                required
                            >
                            <div class="form-text">价格范围：0 ~ 99999999.99</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">联系方式</label>
                            <input
                                type="text"
                                name="contact"
                                class="form-control"
                                value="{{ goods.contact }}"
                                placeholder="请输入联系方式"
                                required
                            >
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">商品分类</label>
                            <select name="category" class="form-select" required>
                                <option value="">请选择分类</option>
                                {% for category in categories %}
                                    <option value="{{ category.id }}" {% if goods.category_id == category.id %}selected{% endif %}>
                                        {{ category.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">商品描述</label>
                            <textarea
                                name="description"
                                class="form-control"
                                rows="6"
                                placeholder="请输入商品描述"
                                required
                            >{{ goods.description }}</textarea>
                        </div>

                        <div class="col-12">
                            <label class="form-label">重新上传图片</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                            <div class="form-text">不重新选择图片则保留原图片</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-5">
                    <label class="form-label">当前图片预览</label>
                    {% if goods.image %}
                        <img src="{{ goods.image.url }}" alt="{{ goods.title }}" class="preview-image mb-3">
                    {% else %}
                        <img src="https://via.placeholder.com/600x400?text=No+Image" alt="{{ goods.title }}" class="preview-image mb-3">
                    {% endif %}

                    <div class="card border-0 bg-light">
                        <div class="card-body">
                            <div class="mb-2"><strong>商品名称：</strong>{{ goods.title }}</div>
                            <div class="mb-2"><strong>当前价格：</strong>￥{{ goods.price }}</div>
                            <div class="mb-2"><strong>当前分类：</strong>{{ goods.category.name }}</div>
                            <div class="mb-0"><strong>发布时间：</strong>{{ goods.created_at|date:"Y-m-d H:i" }}</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-warning">保存修改</button>
                <a href="/goods/detail/{{ goods.id }}/" class="btn btn-primary">返回详情</a>
                <a href="/goods/list/" class="btn btn-secondary">返回列表</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
