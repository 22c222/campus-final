<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布商品</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #eef5ff);
            font-family: "Microsoft YaHei", sans-serif;
        }
        .form-card {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <h2 class="mb-4">发布商品</h2>

        {% if message %}
            <div class="alert alert-danger">{{ message }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">商品名称</label>
                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        placeholder="请输入商品名称"
                        value="{{ form_data.title|default:'' }}"
                        required
                    >
                </div>

                <div class="col-md-6">
                    <label class="form-label">价格</label>
                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        max="99999999.99"
                        name="price"
                        class="form-control"
                        placeholder="请输入价格"
                        value="{{ form_data.price|default:'' }}"
                        required
                    >
                    <div class="form-text">价格范围：0 ~ 99999999.99</div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">联系方式</label>
                    <input
                        type="text"
                        name="contact"
                        class="form-control"
                        placeholder="请输入联系方式"
                        value="{{ form_data.contact|default:'' }}"
                        required
                    >
                </div>

                <div class="col-md-6">
                    <label class="form-label">商品分类</label>
                    <select name="category" class="form-select" required>
                        <option value="">请选择分类</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}"
                                {% if form_data.category == category.id|stringformat:"s" %}selected{% endif %}>
                                {{ category.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">商品描述</label>
                    <textarea
                        name="description"
                        class="form-control"
                        rows="5"
                        placeholder="请输入商品描述"
                        required
                    >{{ form_data.description|default:'' }}</textarea>
                </div>

                <div class="col-12">
                    <label class="form-label">商品图片</label>
                    <input type="file" name="image" class="form-control">
                </div>
            </div>

            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success">提交发布</button>
                <a href="/goods/list/" class="btn btn-secondary">返回列表</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
